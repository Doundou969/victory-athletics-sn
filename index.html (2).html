<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Victory Athletics — Dakar, Sénégal</title>
<meta name="description" content="Victory Athletics - La marque de sport premium à Dakar. Équipements de performance et style urbain sénégalais.">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,600;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<style>
/* ============================================================
   DESIGN SYSTEM & VARIABLES
   ============================================================ */
:root {
  --green: #00853F;
  --yellow: #FDEF42;
  --red: #E31B23;
  --gold: #C9A84C;
  --dark: #080808;
  --dark2: #0f0f0f;
  --dark3: #161616;
  --border: rgba(255,255,255,0.07);
  --white: #FFFFFF;
  --muted: #666;
  --font-display: 'Bebas Neue', sans-serif;
  --font-serif: 'Cormorant Garamond', serif;
  --font-body: 'DM Sans', sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--dark); color: var(--white); font-family: var(--font-body); overflow-x: hidden; }

/* ============================================================
   LAYOUT & NAVIGATION
   ============================================================ */
header { position:fixed; top:0; width:100%; z-index:1000; padding:20px 5%; display:flex; justify-content:space-between; align-items:center; transition:0.4s; }
header.scrolled { background: rgba(8,8,8,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); }
.logo { font-family: var(--font-display); font-size: 2rem; letter-spacing: 2px; color: var(--gold); cursor: pointer; }
nav ul { display: flex; list-style: none; gap: 30px; }
nav a { color: var(--white); text-decoration: none; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; cursor: pointer; }
nav a:hover { color: var(--gold); }

.nav-icons { display: flex; gap: 20px; align-items: center; }
.cart-trigger { position: relative; cursor: pointer; }
.cart-count { position: absolute; top: -8px; right: -12px; background: var(--red); color: white; font-size: 0.7rem; padding: 2px 6px; border-radius: 10px; font-weight: bold; }

/* ============================================================
   PAGES & SECTIONS
   ============================================================ */
.page { display: none; padding-top: 100px; min-height: 100vh; }
.page.active { display: block; animation: fadeIn 0.6s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* SHOP FILTERS */
.shop-filters { display: flex; justify-content: center; gap: 15px; margin: 40px 0; flex-wrap: wrap; }
.filter-btn { background: transparent; border: 1px solid var(--border); color: var(--white); padding: 10px 25px; cursor: pointer; font-family: var(--font-display); transition: 0.3s; }
.filter-btn.active, .filter-btn:hover { background: var(--gold); color: var(--dark); border-color: var(--gold); }

/* PRODUCT GRID */
.product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; padding: 0 5%; }
.product-card { background: var(--dark2); border: 1px solid var(--border); position: relative; overflow: hidden; transition: 0.4s; }
.product-card:hover { transform: translateY(-10px); border-color: var(--gold); }
.product-image { height: 350px; overflow: hidden; position: relative; }
.product-image img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
.product-card:hover img { transform: scale(1.1); }

.add-to-cart-btn { position: absolute; bottom: 0; width: 100%; padding: 15px; background: var(--gold); border: none; font-family: var(--font-display); font-size: 1rem; cursor: pointer; transform: translateY(100%); transition: 0.3s; }
.product-card:hover .add-to-cart-btn { transform: translateY(0); }

.product-info { padding: 20px; }
.category-tag { color: var(--gold); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; }
.product-info h3 { margin: 10px 0; font-family: var(--font-serif); font-size: 1.4rem; }
.price { font-weight: 600; color: var(--white); font-size: 1.2rem; }

/* ============================================================
   PANIER & MODAL PAIEMENT
   ============================================================ */
.cart-drawer { position: fixed; right: -400px; top: 0; width: 400px; height: 100%; background: var(--dark2); z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 30px; border-left: 1px solid var(--border); display:flex; flex-direction:column; }
.cart-drawer.active { right: 0; box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
.cart-items { flex-grow: 1; overflow-y: auto; margin: 30px 0; }
.cart-item { display: flex; gap: 15px; padding-bottom: 20px; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
.cart-item img { width: 80px; height: 80px; object-fit: cover; }

.checkout-btn { width: 100%; padding: 15px; background: var(--gold); border: none; font-family: var(--font-display); font-size: 1.2rem; cursor: pointer; }

/* MODAL OVERLAY */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.active { display: flex; }
.modal-content { background: var(--dark3); padding: 40px; border: 1px solid var(--gold); width: 100%; max-width: 500px; position: relative; }

.method-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
.method-item { border: 1px solid var(--border); padding: 15px; text-align: center; cursor: pointer; border-radius: 8px; }
.method-item img { height: 30px; margin-bottom: 10px; }
.method-item.selected { border-color: var(--gold); background: rgba(201, 168, 76, 0.1); }

/* TOASTS */
#toast-container { position: fixed; bottom: 30px; right: 30px; z-index: 9999; }
.toast { background: var(--gold); color: var(--dark); padding: 15px 30px; margin-top: 10px; font-weight: 600; animation: slideIn 0.3s ease; }
</style>
</head>
<body>

<header id="header">
    <div class="logo" onclick="switchPage('home')">VICTORY</div>
    <nav>
        <ul>
            <li><a onclick="switchPage('home')">Accueil</a></li>
            <li><a onclick="switchPage('shop')">Shop</a></li>
            <li><a onclick="switchPage('about')">Héritage</a></li>
        </ul>
    </nav>
    <div class="nav-icons">
        <div class="cart-trigger" onclick="toggleCart()">
            🛒 <span class="cart-count">0</span>
        </div>
    </div>
</header>

<main id="home" class="page active">
    <section style="height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;">
        <h1 style="font-family: var(--font-display); font-size: 6rem; color: var(--gold);">DOMINEZ VOTRE TERRAIN</h1>
        <p style="font-family: var(--font-serif); font-size: 1.5rem; max-width: 600px;">L'excellence athlétique, de Dakar au monde entier.</p>
        <button class="checkout-btn" style="width: auto; padding: 15px 40px; margin-top: 30px;" onclick="switchPage('shop')">Explorer la collection</button>
    </section>
</main>

<main id="shop" class="page">
    <h2 style="text-align: center; font-family: var(--font-display); font-size: 3rem;">CATALOGUE VICTORY</h2>
    
    <div class="shop-filters">
        <button onclick="filterShop('all')" class="filter-btn active">Tout</button>
        <button onclick="filterShop('performance')" class="filter-btn">Performance</button>
        <button onclick="filterShop('street')" class="filter-btn">Lifestyle</button>
    </div>

    <div class="product-grid">
        <div class="product-card" data-category="performance">
            <div class="product-image">
                <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" alt="Lion Pro">
                <button class="add-to-cart-btn" onclick="addToCart('Lion Pro V1', 75000, 'https://images.unsplash.com/photo-1542291026-7eec264c27ff')">Ajouter au panier</button>
            </div>
            <div class="product-info">
                <span class="category-tag">Lion's Den</span>
                <h3>Lion Pro V1</h3>
                <p class="price">75.000 CFA</p>
            </div>
        </div>

        <div class="product-card" data-category="street">
            <div class="product-image">
                <img src="https://images.unsplash.com/photo-1552346154-21d32810aba3" alt="Dakar Hoodie">
                <button class="add-to-cart-btn" onclick="addToCart('Dakar Heritage Hoodie', 45000, 'https://images.unsplash.com/photo-1552346154-21d32810aba3')">Ajouter au panier</button>
            </div>
            <div class="product-info">
                <span class="category-tag">Dakar Street</span>
                <h3>Heritage Hoodie</h3>
                <p class="price">45.000 CFA</p>
            </div>
        </div>
    </div>
</main>

<div id="cart-drawer" class="cart-drawer">
    <h2 style="font-family: var(--font-display);">VOTRE PANIER</h2>
    <div class="cart-items">
        </div>
    <div class="cart-footer">
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold;">
            <span>TOTAL</span>
            <span id="cart-total">0 CFA</span>
        </div>
        <button class="checkout-btn" onclick="openCheckout()">PASSER À LA CAISSE</button>
    </div>
    <button onclick="toggleCart()" style="margin-top: 20px; background: none; color: white; border: none; cursor: pointer;">Fermer</button>
</div>

<div id="checkout-modal" class="modal-overlay">
    <div class="modal-content">
        <h2 style="font-family: var(--font-display); color: var(--gold);">FINALISER LA COMMANDE</h2>
        <div class="method-grid">
            <div class="method-item" onclick="selectPayment('wave')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/d/d0/Wave_Logo.png" alt="Wave">
                <div>Wave</div>
            </div>
            <div class="method-item" onclick="selectPayment('orange')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/a/a8/Orange_logo.svg" alt="OM">
                <div>Orange Money</div>
            </div>
        </div>
        <form onsubmit="confirmOrder(event)">
            <input type="text" placeholder="Nom complet" required style="width: 100%; padding: 12px; margin-bottom: 10px; background: #222; border: 1px solid var(--border); color: white;">
            <input type="tel" placeholder="Numéro de téléphone" required style="width: 100%; padding: 12px; margin-bottom: 10px; background: #222; border: 1px solid var(--border); color: white;">
            <button type="submit" class="checkout-btn" style="background: var(--green); color: white;">CONFIRMER LE PAIEMENT</button>
        </form>
        <button onclick="closeCheckout()" style="margin-top: 20px; background: none; color: white; border: none; cursor: pointer;">Annuler</button>
    </div>
</div>

<div id="toast-container"></div>



<script>
/* ============================================================
   LOGIQUE DE NAVIGATION
   ============================================================ */
function switchPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
    window.scrollTo(0,0);
}

window.onscroll = () => {
    if (window.scrollY > 50) document.getElementById('header').classList.add('scrolled');
    else document.getElementById('header').classList.remove('scrolled');
};

/* ============================================================
   MOTEUR E-COMMERCE (PANIER & FILTRES)
   ============================================================ */
let cart = JSON.parse(localStorage.getItem('victory_storage')) || [];
let selectedPaymentMethod = '';

function toggleCart() {
    document.getElementById('cart-drawer').classList.toggle('active');
}

function updateCartUI() {
    const container = document.querySelector('.cart-items');
    const badge = document.querySelector('.cart-count');
    const totalDisplay = document.getElementById('cart-total');
    
    container.innerHTML = '';
    let total = 0;

    cart.forEach((item, index) => {
        total += item.price * item.qty;
        container.innerHTML += `
            <div class="cart-item">
                <img src="${item.img}">
                <div>
                    <h4>${item.name}</h4>
                    <p>${item.price.toLocaleString()} CFA</p>
                    <div style="margin-top:5px;">
                        <button onclick="changeQty(${index}, -1)" style="width:25px">-</button>
                        <span>${item.qty}</span>
                        <button onclick="changeQty(${index}, 1)" style="width:25px">+</button>
                    </div>
                </div>
                <button onclick="removeItem(${index})" style="margin-left:auto; color:var(--red); background:none; border:none; cursor:pointer">✕</button>
            </div>
        `;
    });

    badge.innerText = cart.reduce((acc, i) => acc + i.qty, 0);
    totalDisplay.innerText = total.toLocaleString() + ' CFA';
    localStorage.setItem('victory_storage', JSON.stringify(cart));
}

function addToCart(name, price, img) {
    const item = cart.find(i => i.name === name);
    if(item) item.qty++;
    else cart.push({ name, price, img, qty: 1 });
    updateCartUI();
    showToast(`${name} ajouté au panier !`);
}

function changeQty(index, delta) {
    cart[index].qty += delta;
    if(cart[index].qty <= 0) cart.splice(index, 1);
    updateCartUI();
}

function removeItem(index) {
    cart.splice(index, 1);
    updateCartUI();
}

/* ============================================================
   FILTRAGE
   ============================================================ */
function filterShop(cat) {
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    
    document.querySelectorAll('.product-card').forEach(card => {
        card.style.display = (cat === 'all' || card.dataset.category === cat) ? 'block' : 'none';
    });
}

/* ============================================================
   CHECKOUT & PAIEMENT
   ============================================================ */
function openCheckout() {
    if(cart.length === 0) return showToast("Votre panier est vide");
    toggleCart();
    document.getElementById('checkout-modal').classList.add('active');
}

function closeCheckout() {
    document.getElementById('checkout-modal').classList.remove('active');
}

function selectPayment(m) {
    selectedPaymentMethod = m;
    document.querySelectorAll('.method-item').forEach(el => el.classList.remove('selected'));
    event.currentTarget.classList.add('selected');
}

function confirmOrder(e) {
    e.preventDefault();
    if(!selectedPaymentMethod) return showToast("Choisissez un mode de paiement");
    
    showToast("Traitement en cours...");
    setTimeout(() => {
        showToast("Commande confirmée ! Merci Victory Athletics 🇸🇳");
        cart = [];
        updateCartUI();
        closeCheckout();
        switchPage('home');
    }, 2000);
}

function showToast(msg) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.innerText = msg;
    document.getElementById('toast-container').appendChild(t);
    setTimeout(() => t.remove(), 3000);
}

// Init au chargement
updateCartUI();
</script>
</body>
</html>
